<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e0e0e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="#a0ffc4" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#a0ffc4" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#a0ffc4" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#a0ffc4" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#a0ffc4" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Lock icon (represents encryption) -->
  <g transform="translate(200, 150)">
    <!-- Lock body -->
    <rect x="-35" y="0" width="70" height="60" rx="4" fill="none" stroke="#a0ffc4" stroke-width="2"/>
    
    <!-- Lock shackle -->
    <path d="M -25 0 Q -25 -30 0 -35 Q 25 -30 25 0" fill="none" stroke="#a0ffc4" stroke-width="2"/>
    
    <!-- Key hole -->
    <circle cx="0" cy="25" r="5" fill="#a0ffc4" opacity="0.3"/>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#a0ffc4" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Text label -->
  <text x="200" y="270" font-family="monospace" font-size="16" fill="#a0ffc4" text-anchor="middle" font-weight="bold">
    SECURE ENCRYPTION
  </text>
  <text x="200" y="290" font-family="monospace" font-size="12" fill="#ababab" text-anchor="middle">
    AES-256 File Protection
  </text>
</svg>