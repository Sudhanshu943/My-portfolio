<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e0e0e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGradient2)"/>
  
  <!-- Decorative grid lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="#00bdfd" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#00bdfd" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#00bdfd" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#00bdfd" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#00bdfd" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Password strength meter -->
  <g transform="translate(200, 140)">
    <!-- Meter background -->
    <rect x="-50" y="-20" width="100" height="12" rx="2" fill="#484848" opacity="0.5"/>
    
    <!-- Strength bars (green/strong) -->
    <rect x="-46" y="-16" width="18" height="4" rx="1" fill="#a0ffc4"/>
    <rect x="-20" y="-16" width="18" height="4" rx="1" fill="#a0ffc4"/>
    <rect x="6" y="-16" width="18" height="4" rx="1" fill="#a0ffc4"/>
    <rect x="32" y="-16" width="18" height="4" rx="1" fill="#a0ffc4"/>
    
    <!-- Shield icon -->
    <path d="M 0 -50 L -30 -30 L -30 10 Q 0 40 0 40 Q 30 40 30 10 L 30 -30 Z" fill="none" stroke="#00bdfd" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="3" fill="#00bdfd"/>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00bdfd" stroke-width="1" opacity="0.15"/>
  </g>
  
  <!-- Text label -->
  <text x="200" y="270" font-family="monospace" font-size="16" fill="#00bdfd" text-anchor="middle" font-weight="bold">
    PASSWORD ANALYZER
  </text>
  <text x="200" y="290" font-family="monospace" font-size="12" fill="#ababab" text-anchor="middle">
    Entropy & Security Scoring
  </text>
</svg>